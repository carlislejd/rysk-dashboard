<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rysk Global Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <nav class="dashboard-nav">
                <a href="/" class="active">Global</a>
                <a href="/account">Account</a>
            </nav>
            <h1>Rysk Global Dashboard</h1>
        </header>

        <!-- 1. Protocol Overview + Volume -->
        <section class="card">
            <h2>Protocol Overview</h2>
            <div class="tabs" id="overview-tabs">
                <button class="tab-button active" data-overview-days="0">All Time</button>
                <button class="tab-button" data-overview-days="7">7 Days</button>
                <button class="tab-button" data-overview-days="30">30 Days</button>
                <button class="tab-button" data-overview-days="90">90 Days</button>
            </div>
            <div id="summary-loading" class="loading">Loading summary...</div>
            <div id="summary-content" style="display: none;">
                <div class="summary-grid" id="summary-grid"></div>
            </div>
            <div id="volume-chart" class="chart-container" style="margin-top: 24px;"></div>
        </section>

        <!-- 2. Recent Activity -->
        <section class="card">
            <h2>Recent Activity</h2>
            <div id="recent-loading" class="loading">Loading...</div>
            <div id="recent-content" style="display: none;">
                <table id="recent-table" class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Asset</th>
                            <th>Type</th>
                            <th>Strike</th>
                            <th>Premium</th>
                            <th>Notional</th>
                            <th>APR</th>
                            <th>IV</th>
                        </tr>
                    </thead>
                    <tbody id="recent-body"></tbody>
                </table>
            </div>
        </section>

        <!-- 3. Asset Carousel -->
        <section class="card">
            <h2>Assets</h2>
            <div id="assets-loading" class="loading">Loading assets...</div>
            <div id="assets-content" style="display: none;">
                <div class="asset-carousel">
                    <button class="carousel-arrow left" id="asset-carousel-left">&#8249;</button>
                    <div class="asset-carousel-track" id="asset-grid"></div>
                    <button class="carousel-arrow right" id="asset-carousel-right">&#8250;</button>
                </div>
            </div>
        </section>

        <!-- Asset Detail Panel (appears when card clicked) -->
        <section id="asset-detail" class="card" style="display: none;">
            <h2>
                <span id="detail-asset-name"></span>
                <span id="detail-close" style="float: right; cursor: pointer; color: var(--text-muted); font-size: 0.7em;">&times; close</span>
            </h2>
            <div class="asset-carousel" style="margin-top: 0;">
                <button class="carousel-arrow left" id="expiry-carousel-left">&#8249;</button>
                <div class="tabs tab-carousel" id="detail-expiry-tabs"></div>
                <button class="carousel-arrow right" id="expiry-carousel-right">&#8250;</button>
            </div>
            <div id="detail-summary" class="summary-grid" style="margin-bottom: 24px;"></div>
            <h3 class="subsection-title">Volume Over Time</h3>
            <div id="detail-volume-chart" class="chart-container"></div>
            <h3 class="subsection-title">Strike Distribution</h3>
            <div id="detail-strike-chart" class="chart-container"></div>
            <div id="detail-expiry-content"></div>
            <h3 class="subsection-title">Trades</h3>
            <div id="detail-trades-content"></div>
            <div class="pager" id="detail-trades-pager"></div>
        </section>

        <!-- 6. Expiry Outcomes -->
        <section class="card">
            <h2>Expiry Outcomes</h2>
            <div id="outcomes-loading" class="loading">Loading outcomes...</div>
            <div id="outcomes-content" style="display: none;">
                <div class="summary-grid" id="outcomes-summary"></div>
            </div>
        </section>

    </div>

    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
</body>
</html>
